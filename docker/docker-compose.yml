version: "3.9"

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    image: agrios-india:latest
    container_name: agrios-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.agrios.rule=Host(`agrios.local`)"

  # Local dev Vite server (use for development only)
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: builder
    image: agrios-india:dev
    container_name: agrios-dev
    volumes:
      - ../src:/app/src
      - ../public:/app/public
      - ../api:/app/api
    ports:
      - "5199:5199"
    command: npm run dev -- --host 0.0.0.0
    environment:
      - NODE_ENV=development
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    profiles: ["dev"]

networks:
  default:
    name: agrios-network
