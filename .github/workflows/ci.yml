name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check (if applicable)
        run: npx tsc --noEmit 2>/dev/null || echo "No TypeScript config — skipping"

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Verify build output
        run: |
          test -d dist || (echo "Build output missing" && exit 1)
          test -f dist/index.html || (echo "index.html missing" && exit 1)
          echo "Build size:"
          du -sh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 7

  dataset-validate:
    name: Dataset Schema Validation
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate dataset schemas
        run: |
          echo "Dataset schema validation — runs as part of the MLOps pipeline"
          echo "Real validation runs in the app via datasetValidator.runFullValidation()"
          echo "For CI: validate any JSON schema files in data/ if present"
          if [ -d "data" ]; then
            find data/ -name "*.json" -exec node -e "JSON.parse(require('fs').readFileSync('{}'))" \; 2>&1
          fi

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded API keys..."
          if grep -r "ANTHROPIC_API_KEY\s*=\s*['\"]sk-" src/ --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "ERROR: Hardcoded API key found in src/" && exit 1
          fi
          echo "No hardcoded secrets found in src/"

      - name: Verify API key stays server-side
        run: |
          echo "Verifying API key is only used in api/ (Vercel serverless)..."
          if grep -r "ANTHROPIC_API_KEY" src/ --include="*.js" --include="*.jsx" 2>/dev/null; then
            echo "ERROR: ANTHROPIC_API_KEY referenced in src/ (must stay in api/ only)" && exit 1
          fi
          echo "API key correctly isolated to server-side api/"
